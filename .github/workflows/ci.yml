name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib -- --test-threads=1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm typecheck
      - name: Biome lint
        run: pnpm lint
      - name: Vitest
        run: pnpm test
      - name: Vite build
        run: pnpm vite build

  audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: pnpm audit
        run: |
          npm install -g pnpm@10
          pnpm install --frozen-lockfile
          pnpm audit --prod --audit-level=high || echo "::warning::pnpm audit found issues"
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo install audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit --manifest-path src-tauri/Cargo.toml
        continue-on-error: true
