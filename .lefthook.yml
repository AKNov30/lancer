pre-commit:
  parallel: true
  commands:
    biome:
      priority: 1
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: pnpm dlx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      priority: 2
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit
    cargo-fmt:
      priority: 2
      glob: "src-tauri/**/*.rs"
      run: PATH="$HOME/.cargo/bin:$PATH" cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
    cargo-clippy:
      priority: 2
      glob: "src-tauri/**/*.rs"
      run: PATH="$HOME/.cargo/bin:$PATH" cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

pre-push:
  commands:
    test-rust:
      glob: "src-tauri/**/*.rs"
      # Sequential to avoid parallel saturation of external HTTP test endpoints (httpbin)
      run: PATH="$HOME/.cargo/bin:$PATH" cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1

commit-msg:
  commands:
    commitlint:
      run: pnpm dlx --silent @commitlint/cli --edit {1}
